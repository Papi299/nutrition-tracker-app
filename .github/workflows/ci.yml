name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Check repository hygiene
        run: git diff --check "${{ github.event.pull_request.base.sha || github.event.before }}..${{ github.sha }}"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run pure unit tests
        run: npm run test:date

      - name: Build production application
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase
        run: npx supabase start

      - name: Replay migrations and seed locally
        run: npx supabase db reset --local

      - name: Verify internal ingestion types
        run: npm run types:ingestion:check

      - name: Run local-only Playwright suite
        run: npm run test:e2e -- --reporter=line,html

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
